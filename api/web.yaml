openapi: "3.0.0"
info:
  version: 0.0.0
  title: portal
  description: UCL ARC portal web API
servers:
  - url: /web/api/v0

paths:
  /auth:
    get:
      description: Authentication and authorization status of the user
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Auth"
        "401":
          description: Unauthenticated
        "500":
          description: Internal server error
        default:
          description: Unexpected error

  /notifications:
    get:
      description: Get a list of notifications
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Notification"
        "401":
          description: Unauthenticated
        "500":
          description: Internal server error
        default:
          description: Unexpected error
  /notifications/{notificationId}/read:
    post:
      description: Mark a single notification as read
      parameters:
        - in: path
          name: notificationId
          required: true
          description: ID of the notification to be updated
          schema:
            type: string
      responses:
        "204":
          description: OK
        "401":
          description: Unauthenticated
        "500":
          description: Internal server error
        default:
          description: Unexpected error
  /notifications/read:
    post:
      description: Mark all notifications of a kind as read
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NotificationsReadAll"
      responses:
        "204":
          description: OK
        "500":
          description: Internal server error
        default:
          description: Unexpected error

  /feedback:
    post:
      description: Submit some feedback for the portal
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Feedback"
      responses:
        "204":
          description: OK
        "500":
          description: Internal server error

  /profile:
    get:
      description: Users profile
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"
        default:
          description: Unexpected error
    post:
      description: Update own profile chosen name
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProfileUpdate"
      responses:
        "200":
          description: "Successfully updated profile"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"
        "500":
          description: Internal server error
        default:
          description: Unexpected error

  /profile/agreements:
    get:
      description: Get all the agreements a user has agreed to
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserAgreements"
        "500":
          description: Internal server error
        default:
          description: Unexpected error
    post:
      description: Update the agreements for a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgreementConfirmation"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserAgreements"
        "500":
          description: Internal server error
        default:
          description: Unexpected error

  /profile/training:
    get:
      description: Get the training record status for a user
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfileTraining"
        "500":
          description: Internal server error
        default:
          description: Unexpected error
    post:
      description: Update the training record for a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProfileTrainingUpdate"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfileTrainingResponse"
          description: Accepted
        "500":
          description: Internal server error
        default:
          description: Unexpected error

  /tokens/{environment}:
    get:
      description: List tokens for an environment API
      parameters:
        - $ref: "#/components/parameters/EnvironmentParam"
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Token"
        "500":
          description: Internal server error
        default:
          description: Unexpected error
    post:
      description: Create a token for the DSH API
      parameters:
        - $ref: "#/components/parameters/EnvironmentParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TokenRequest"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenWithValue"
        "500":
          description: Internal server error
        default:
          description: Unexpected error
  /tokens/{environment}/{tokenId}:
    delete:
      description: Revoke a token for the DSH API
      parameters:
        - $ref: "#/components/parameters/EnvironmentParam"
        - in: path
          name: tokenId
          required: true
          description: ID of the token to be updated
          schema:
            type: string
      responses:
        "204":
          description: OK
        "500":
          description: Internal server error
        default:
          description: Unexpected error

  /agreements/{agreementType}:
    get:
      description: Get the latest approved researcher agreement
      parameters:
        - in: path
          name: agreementType
          required: true
          description: Type of agreement to get
          schema:
            $ref: "#/components/schemas/AgreementType"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agreement"
        "406":
          description: Not acceptable
        "500":
          description: Internal server error
        default:
          description: Unexpected error

  /users:
    get:
      description: Get all the users a user has access to view
      parameters:
        - $ref: "#/components/parameters/UserFindParam"
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserData"
        "403":
          description: Forbidden
        "500":
          description: Internal server error
        default:
          description: Unexpected error

  /users/lookup:
    get:
      description: Lookup users a user has access to view
      parameters:
        - $ref: "#/components/parameters/UserFindParam"
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserDataLookup"
        "403":
          description: Forbidden
        "500":
          description: Internal server error
        default:
          description: Unexpected error

  /users/{userId}/training:
    post:
      parameters:
        - $ref: "#/components/parameters/UserIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserTrainingUpdate"
      responses:
        "200":
          description: Successfully updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrainingRecord"
        "403":
          description: Forbidden
        "404":
          description: Not found
        "500":
          description: Internal server error
        default:
          description: Unexpected error

  /users/{userId}/attributes:
    put:
      description: Update a user's attributes (admin only)
      parameters:
        - $ref: "#/components/parameters/UserIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - chosen_name
              properties:
                chosen_name:
                  type: string
      responses:
        "200":
          description: Successfully updated attributes
        "400":
          description: Invalid request
        "403":
          description: Forbidden
        "404":
          description: User not found
        "500":
          description: Internal server error
        default:
          description: Unexpected error

  /users/approved-researchers/import/csv:
    post:
      description: |
        Upload a CSV file with fields
        <username: string, e.g. "bob@example.com">,
        <agreed to agreement: bool, e.g. true>,
        <NHSD training completed at date: string, e.g. 2021-03-11>
      requestBody:
        required: true
        content:
          text/csv:
            schema:
              type: string
              format: binary
      responses:
        "204":
          description: OK
        "403":
          description: Forbidden
        "500":
          description: Internal server error
        default:
          description: Unexpected error

  /users/invite:
    post:
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
              properties:
                email:
                  type: string
                  description: Email address of the person to be invited
                study_name:
                  type: string
                  description: Optional name of study for notification
                project_name:
                  type: string
                  description: Optional name of project for notification

      responses:
        "200":
          description: Successfully sent invite
        default:
          description: Unexpected error

  /users/metrics:
    get:
      description: Get summary metrics about all users
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserMetrics"

  # Study Management
  /studies:
    get:
      description: Get all studies accessible to the current user. Filtering is admin only
      parameters:
        - in: query
          name: status
          description: get studies by status
          required: false
          schema:
            $ref: "#/components/schemas/StudyApprovalStatus"
        - in: query
          name: query
          required: false
          description: |
            Flexible search query. Depending on the structure it will either search:
              - caseref: If <= 5 digit number, with optional leading zeros
              - study owner email/username: If the query contains an @
              - partial study name: If none of the above
          schema:
            type: string
        - in: query
          name: caseref
          required: false
          description: Study caseref
          schema:
            type: integer
        - in: query
          name: fuzzy_title
          required: false
          description: Fuzzy title to match on
          schema:
            type: string
        - in: query
          name: owner_username
          required: false
          description: Full username of the study owner. e.g. ccxyz@ucl.ac.uk
          schema:
            type: string
        - in: query
          name: limit
          required: false
          description: Maximum number of items to return
          schema:
            type: integer
        - in: query
          name: offset
          required: false
          description: Index of the first item to return
          schema:
            type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Study"
        "403":
          description: Forbidden
        "500":
          description: Internal server error
        default:
          description: Unexpected error
    post:
      description: Create a new study
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StudyRequest"
      responses:
        "201":
          description: Study created successfully
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationError"
        "406":
          description: Invalid request
        "403":
          description: Forbidden
        "500":
          description: Internal server error
        default:
          description: Unexpected error

  /studies/{studyId}:
    get:
      description: Get details of a specific study
      parameters:
        - $ref: "#/components/parameters/StudyIdParam"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Study"
        "403":
          description: Forbidden
        "404":
          description: Study not found
        "500":
          description: Internal server error
        default:
          description: Unexpected error
    put:
      description: Update a specific study
      parameters:
        - in: path
          name: studyId
          required: true
          description: ID of the study
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StudyRequest"
      responses:
        "200":
          description: Study updated successfully
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationError"
        "403":
          description: Forbidden
        "404":
          description: Study not found
        "500":
          description: Internal server error
        default:
          description: Unexpected error

  /studies/admin/{studyId}/review:
    post:
      description: Update study status + opportunity to update feedback
      parameters:
        - $ref: "#/components/parameters/StudyIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StudyReview"
      responses:
        "201":
          description: Study review submitted successfully
        "403":
          description: Forbidden
        "404":
          description: Study not found
        "500":
          description: Internal server error
        default:
          description: Unexpected error

  /studies/admin/{studyId}/owner-request:
    post:
      description: Request an owner change
      parameters:
        - $ref: "#/components/parameters/StudyIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StudyOwnerUpdate"
      responses:
        "200":
          description: Owner change request successful
        "403":
          description: Forbidden
        "404":
          description: Study not found
        "500":
          description: Internal server error

  /studies/admin/{studyId}/owner-approve:
    post:
      description: Approve an owner change
      parameters:
        - $ref: "#/components/parameters/StudyIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StudyOwnerUpdate"
      responses:
        "200":
          description: Owner update approval successful
        "403":
          description: Forbidden
        "404":
          description: Study not found
        "500":
          description: Internal server error

  /studies/admin/import:
    post:
      description: Tempoary endpoint to import a study object. Idempotent. Updates on caseref
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StudyImport"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Study"
  /studies/admin/{studyId}/assets/import:
    post:
      description: Tempoary endpoint to import a asset object for a contract. Idempotent. Updates on title
      parameters:
        - $ref: "#/components/parameters/StudyIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssetImport"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Asset"
  /studies/admin/{studyId}/contracts/import:
    post:
      description: Tempoary endpoint to import a contract object for a contract. Idempotent. Updates on title
      parameters:
        - $ref: "#/components/parameters/StudyIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContractImport"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contract"

  /studies/{studyId}/pending:
    patch:
      description: Update study status to pending
      parameters:
        - $ref: "#/components/parameters/StudyIdParam"
      responses:
        "201":
          description: Study review submitted successfully
        "403":
          description: Forbidden
        "404":
          description: Study not found

  /studies/{studyId}/signoff:
    post:
      description: Record that the IAO has attested the study details are up to date, resetting the signoff timestamp
      parameters:
        - $ref: "#/components/parameters/StudyIdParam"
      responses:
        "200":
          description: Signoff recorded successfully
        "403":
          description: Forbidden
        "404":
          description: Study not found
        "500":
          description: Internal server error

  /studies/{studyId}/owner-request:
    post:
      description: Request an owner change
      parameters:
        - $ref: "#/components/parameters/StudyIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StudyOwnerUpdate"
      responses:
        "200":
          description: Owner change request successful
        "403":
          description: Forbidden
        "404":
          description: Study not found
        "500":
          description: Internal server error

  # Environments
  /environments:
    get:
      description: Get all available environments with their tier mappings
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Environment"
        "500":
          description: Internal server error
        default:
          description: Unexpected error

  # Project Management - All Environments
  /projects:
    get:
      description: Get all projects that a user has access to view (across all environments)
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Project"
        "403":
          description: Forbidden
        "500":
          description: Internal server error
        default:
          description: Unexpected error

  # Project Management - TRE Environment
  /projects/tre:
    get:
      description: Get all TRE projects that a user has access to view
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProjectTRE"
        "403":
          description: Forbidden
        "500":
          description: Internal server error
        default:
          description: Unexpected error
    post:
      description: Create a TRE project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectTRERequest"
      responses:
        "201":
          description: TRE project created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectTRE"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationError"
        "403":
          description: Forbidden
        "500":
          description: Internal server error
        default:
          description: Unexpected error

  /projects/tre/{projectId}:
    get:
      description: Get one TRE project with base project details joined in
      parameters:
        - $ref: "#/components/parameters/ProjectIdParam"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectTRE"
        "403":
          description: Forbidden
        "404":
          description: Project not found
        "500":
          description: Internal server error
        default:
          description: Unexpected error
    put:
      description: Update a TRE project (members and assets only)
      parameters:
        - $ref: "#/components/parameters/ProjectIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectTREUpdate"
      responses:
        "200":
          description: Project updated successfully
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationError"
        "403":
          description: Forbidden
        "404":
          description: Project not found
        "500":
          description: Internal server error
        default:
          description: Unexpected error
    delete:
      description: Delete a TRE project (soft delete with cascading to related tables)
      parameters:
        - $ref: "#/components/parameters/ProjectIdParam"
      responses:
        "204":
          description: Project deleted successfully
        "403":
          description: Forbidden
        "404":
          description: Project not found
        "500":
          description: Internal server error
        default:
          description: Unexpected error

  /projects/tre/{projectId}/pending:
    patch:
      description: Submit a TRE project for review (changes status from Incomplete to Pending)
      parameters:
        - $ref: "#/components/parameters/ProjectIdParam"
      responses:
        "200":
          description: Project submitted successfully
        "403":
          description: Forbidden
        "404":
          description: Project not found
        "500":
          description: Internal server error
        default:
          description: Unexpected error

  /projects/tre/admin/{projectId}/approve:
    post:
      description: Approve a TRE project (admin/TRE ops staff only)
      parameters:
        - $ref: "#/components/parameters/ProjectIdParam"
      responses:
        "200":
          description: Project approved successfully
        "403":
          description: Forbidden
        "404":
          description: Project not found
        "500":
          description: Internal server error
        default:
          description: Unexpected error
  /projects/tre/admin/import:
    post:
      description: Import a TRE project into the portal
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectTREImport"
      responses:
        "204":
          description: Project imported
        "403":
          description: Forbidden
        "404":
          description: Project not found
        "500":
          description: Internal server error
        default:
          description: Unexpected error

  # Study Asset Management
  /studies/{studyId}/assets:
    get:
      description: Get all assets for a specific study
      parameters:
        - $ref: "#/components/parameters/StudyIdParam"
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Asset"
        "403":
          description: Forbidden
        "404":
          description: Study not found
        "500":
          description: Internal server error
        default:
          description: Unexpected error
    post:
      description: Create a new asset for a specific study
      parameters:
        - $ref: "#/components/parameters/StudyIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssetBase"
      responses:
        "201":
          description: Asset created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Asset"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationError"
        "403":
          description: Forbidden
        "500":
          description: Internal server error
        default:
          description: Unexpected error

  /studies/{studyId}/assets/{assetId}:
    get:
      description: Get details of a specific asset within a study
      parameters:
        - $ref: "#/components/parameters/StudyIdParam"
        - $ref: "#/components/parameters/AssetIdParam"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Asset"
        "403":
          description: Forbidden - no access to study or asset
        "404":
          description: Study or asset not found
        "500":
          description: Internal server error
        default:
          description: Unexpected error
    put:
      description: Update an existing asset within a study
      parameters:
        - $ref: "#/components/parameters/StudyIdParam"
        - $ref: "#/components/parameters/AssetIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssetBase"
      responses:
        "200":
          description: Asset updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Asset"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationError"
        "403":
          description: Forbidden - no access to study or asset
        "404":
          description: Study or asset not found
        "500":
          description: Internal server error
        default:
          description: Unexpected error
    delete:
      description: Delete an asset within a study
      parameters:
        - $ref: "#/components/parameters/StudyIdParam"
        - $ref: "#/components/parameters/AssetIdParam"
      responses:
        "204":
          description: Asset deleted successfully
        "400":
          description: Asset is linked to a contract and cannot be deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationError"
        "403":
          description: Forbidden - no access to study or asset
        "404":
          description: Study or asset not found
        "500":
          description: Internal server error
        default:
          description: Unexpected error

  /studies/{studyId}/assets/{assetId}/contracts:
    get:
      description: Get contracts associated with a specific asset within a study
      parameters:
        - $ref: "#/components/parameters/StudyIdParam"
        - $ref: "#/components/parameters/AssetIdParam"
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Contract"
        "403":
          description: Forbidden - no access to study or asset
        "404":
          description: Study or asset not found
        "500":
          description: Internal server error
        default:
          description: Unexpected error

  /logout:
    get:
      description: Log the user out
      responses:
        "302":
          description: Successfully logged out
        default:
          description: Unexpected error

  # Study Agreement Management
  /studies/{studyId}/agreements:
    get:
      description: Get all agreements signed for a specific study
      parameters:
        - $ref: "#/components/parameters/StudyIdParam"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StudyAgreements"
        "403":
          description: Forbidden
        "404":
          description: Study not found
        "500":
          description: Internal server error
        default:
          description: Unexpected error
    post:
      description: Sign an agreement for a specific study
      parameters:
        - $ref: "#/components/parameters/StudyIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgreementConfirmation"
      responses:
        "200":
          description: Agreement signed successfully
        "400":
          description: Invalid request
        "403":
          description: Forbidden
        "404":
          description: Study not found
        "500":
          description: Internal server error
        default:
          description: Unexpected error

  /studies/{studyId}/contracts:
    get:
      description: Get all contracts for a specific study
      parameters:
        - $ref: "#/components/parameters/StudyIdParam"
      responses:
        "200":
          description: List of contracts for the study
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Contract"
        "403":
          description: Forbidden
        "404":
          description: Asset not found
        "500":
          description: Internal server error
        default:
          description: Unexpected error
    post:
      description: Create a contract
      parameters:
        - $ref: "#/components/parameters/StudyIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContractBase"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contract"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationError"
        "403":
          description: Forbidden
        "500":
          description: Internal server error
        default:
          description: Unexpected error

  /studies/{studyId}/contracts/{contractId}:
    get:
      description: Get a contract
      parameters:
        - $ref: "#/components/parameters/StudyIdParam"
        - $ref: "#/components/parameters/ContractIdParam"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contract"

    put:
      description: Update contract metadata
      parameters:
        - $ref: "#/components/parameters/StudyIdParam"
        - $ref: "#/components/parameters/ContractIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContractBase"
      responses:
        "200":
          description: Contract updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contract"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationError"
        "403":
          description: Forbidden
        "404":
          description: Contract not found
        "500":
          description: Internal server error
        default:
          description: Unexpected error

    delete:
      description: Delete a contract
      parameters:
        - $ref: "#/components/parameters/StudyIdParam"
        - $ref: "#/components/parameters/ContractIdParam"
      responses:
        "204":
          description: Contract deleted successfully
        "400":
          description: Validation error
        "404":
          description: Contract not found
        "500":
          description: Internal server error

  /studies/{studyId}/contracts/{contractId}/objects:
    post:
      description: Upload a contract object e.g. PDF
      parameters:
        - $ref: "#/components/parameters/StudyIdParam"
        - $ref: "#/components/parameters/ContractIdParam"
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/ContractObject"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContractObjectMetadata"
        "403":
          description: Forbidden
        "500":
          description: Internal server error
        default:
          description: Unexpected error

  /studies/{studyId}/contracts/{contractId}/objects/{contractObjectId}:
    get:
      description: Get a contract object e.g. PDF
      parameters:
        - $ref: "#/components/parameters/StudyIdParam"
        - $ref: "#/components/parameters/ContractIdParam"
        - $ref: "#/components/parameters/ContractObjectIdParam"
      responses:
        "200":
          description: OK
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "403":
          description: Forbidden
        "500":
          description: Internal server error
        default:
          description: Unexpected error
    delete:
      description: Delete a contract object e.g. PDF
      parameters:
        - $ref: "#/components/parameters/StudyIdParam"
        - $ref: "#/components/parameters/ContractIdParam"
        - $ref: "#/components/parameters/ContractObjectIdParam"
      responses:
        "204":
          description: OK
        "403":
          description: Forbidden
        "500":
          description: Internal server error
        default:
          description: Unexpected error

components:
  parameters:
    UserIdParam:
      name: userId
      in: path
      required: true
      description: User UUID
      schema:
        type: string
    StudyIdParam:
      in: path
      name: studyId
      required: true
      description: Study UUID
      schema:
        type: string
    ProjectIdParam:
      in: path
      name: projectId
      required: true
      description: Project UUID
      schema:
        type: string
    AssetIdParam:
      in: path
      name: assetId
      required: true
      description: Asset UUID
      schema:
        type: string
    ContractIdParam:
      in: path
      name: contractId
      required: true
      description: Contract UUID
      schema:
        type: string
    ContractObjectIdParam:
      in: path
      name: contractObjectId
      required: true
      description: Contract object UUID
      schema:
        type: string
    EnvironmentParam:
      in: path
      name: environment
      required: true
      description: Short environment name
      schema:
        type: string
        enum:
          - dsh
          - tre
    UserFindParam:
      in: query
      name: find
      required: true
      description: user details to lookup by in entra. This can be valid within the user principal name, email, given name or display name eg. "tom", "hughes", "ccaeaea", "laura@example"
      schema:
        type: string

  schemas:
    Auth:
      type: object
      required:
        - username
        - roles
      properties:
        username:
          type: string
        roles:
          type: array
          description: |
            List of roles assigned to the user. This array can contain both:
            - Global roles (see below enum values): System-wide roles like admin, staff, approved-researcher
            - Additional dynamic resource-specific roles: Runtime roles like project_{id}_owner, study_{id}_admin
          items:
            type: string
            enum:
              - admin
              - base
              - staff
              - approved-researcher
              - approved-staff-researcher
              - information-asset-owner
              - information-asset-administrator
              - tre-ops-staff
              - ig-ops-staff
              - dsh-ops-staff

    Notification:
      type: object
      required:
        - id
        - title
      properties:
        id:
          type: string
          description: UUID of the notification
        title:
          type: string
        body:
          type: string
        kind:
          $ref: "#/components/schemas/NotificationKind"
        href:
          type: string
          description: Local link to follow e.g. "/profile"

    NotificationsReadAll:
      type: object
      properties:
        kind:
          $ref: "#/components/schemas/NotificationKind"

    NotificationKind:
      type: string
      enum:
        - complete-profile
        - asset-expiry
        - contract-expiry
        - training-expiry
        - iaa-assignment
        - study-affirmation
        - study-review

    Profile:
      type: object
      required:
        - username
        - chosen_name
      properties:
        username:
          type: string
        chosen_name:
          type: string

    ProfileUpdate:
      type: object
      required:
        - chosen_name
      properties:
        chosen_name:
          type: string

    Agreement:
      type: object
      required:
        - id
        - text
      properties:
        id:
          type: string
          description: UUID of the agreement
        text:
          type: string

    AgreementConfirmation:
      type: object
      required:
        - agreement_id
      properties:
        agreement_id:
          type: string
          description: UUID of the agreement that has been agreed to

    ConfirmedAgreement:
      type: object
      required:
        - confirmed_at
        - agreement_type
      properties:
        confirmed_at:
          type: string
          description: Time in RFC3339 format at which the agreement was confirmed
        agreement_type:
          $ref: "#/components/schemas/AgreementType"
          description: Type of agreement that was confirmed

    AgreementType:
      type: string
      enum:
        - approved-researcher
        - study-owner
        - study-administrator

    UserAgreements:
      type: object
      required:
        - confirmed_agreements
      properties:
        confirmed_agreements:
          type: array
          items:
            $ref: "#/components/schemas/ConfirmedAgreement"

    StudyAgreements:
      type: object
      required:
        - usernames
      properties:
        usernames:
          type: array
          description: Usernames of those that have agreed to the study agreement
          items:
            type: string

    TrainingKind:
      type: string
      enum:
        - training_kind_nhsd
        - training_kind_uclh_ig

    ProfileTrainingUpdate:
      type: object
      properties:
        kind:
          $ref: "#/components/schemas/TrainingKind"
        certificate_content_pdf_base64:
          type: string
          description: Base64 encoded PDF file data of the certificate

    ProfileTrainingResponse:
      type: object
      properties:
        certificate_is_valid:
          type: boolean
          description: Is the certificate valid
        certificate_message:
          type: string
          description: Reason why the training certificate is valid/invalid
        certificate_issued_at:
          type: string
          description: Time in RFC3339 format at which the the certificate was issued

    TrainingRecord:
      type: object
      required:
        - kind
        - is_valid
      properties:
        kind:
          $ref: "#/components/schemas/TrainingKind"
          description: The type of training
        is_valid:
          type: boolean
          description: Whether this training certification is currently valid
        is_ig_kind:
          type: boolean
          description: Whether this kind of training is approved by information governance to support an approved researcher status
        completed_at:
          type: string
          description: Time in RFC3339 format when the training was completed

    ProfileTraining:
      type: object
      required:
        - training_records
      properties:
        training_records:
          type: array
          items:
            $ref: "#/components/schemas/TrainingRecord"
          description: List of all training records for the user

    User:
      type: object
      required:
        - username
        - id
      properties:
        username:
          type: string
        id:
          type: string

    UserData:
      type: object
      required:
        - user
        - roles
        - agreements
        - training_record
        - is_valid_approved_researcher
      properties:
        user:
          $ref: "#/components/schemas/User"
        roles:
          type: array
          items:
            type: string
        agreements:
          $ref: "#/components/schemas/UserAgreements"
        training_record:
          $ref: "#/components/schemas/ProfileTraining"
        chosen_name:
          type: string
        is_valid_approved_researcher:
          type: boolean

    UserDataLookup:
      type: object
      required:
        - username
        - is_valid_approved_researcher
      properties:
        username:
          type: string
        chosen_name:
          type: string
        is_valid_approved_researcher:
          type: boolean

    UserTrainingUpdate:
      type: object
      required:
        - training_kind
        - training_date
      properties:
        training_kind:
          $ref: "#/components/schemas/TrainingKind"
        training_date:
          type: string
          description: Time in RFC3339 format at which the the certificate was issued

    UserMetrics:
      type: object
      required:
        - total
        - num_approved_researchers_valid_training
        - num_approved_researchers_expired_training
      properties:
        total:
          type: integer
        num_approved_researchers_valid_training:
          type: integer
        num_approved_researchers_expired_training:
          type: integer

    AssetBase:
      type: object
      description: A data asset representing a set of related data entities
      required:
        - title
        - description
        - classification_impact
        - tier
        - locations
        - data_types
        - format
        - requires_contract
        - has_dspt
        - stored_outside_uk_eea
        - accessed_by_third_parties
        - third_party_agreement
        - status
      properties:
        title:
          type: string
          description: Title of the asset
        description:
          type: string
          description: Description of the asset
        source:
          type: string
          description: Source of the data. e.g. 'NHS Trust X'
        classification_impact:
          type: string
          enum:
            - public
            - confidential
            - highly_confidential
          description: Classification level of the asset
        tier:
          type: integer
          minimum: 0
          maximum: 4
          description: Security tier level for the asset (0=public, 1=confidential, 2-4=highly confidential)
        locations:
          type: array
          items:
            type: string
          description: Storage locations and touchpoints for the asset
        data_types:
          type: array
          items:
            type: string
            enum:
              - "personal"
              - "special_category_personal"
              - "commercially_confidential"
              - "research"
              - "administrative_operations"
              - "financial"
              - "audio"
              - "video"
              - "images"
              - "software"
              - "documentation"
              - "research_output"
              - "other"
          description: Types of data that are present in the asset
        protection:
          type: string
          enum:
            - anonymisation
            - pseudonymisation
            - identifiable_low_confidence_pseudonymisation
          description: Type of protection applied to the asset
        legal_basis:
          type: string
          enum:
            - consent
            - contract
            - legal_obligation
            - vital_interests
            - public_task
            - legitimate_interests
          description: Legal basis for holding the asset
        legal_basis_special:
          type: string
          enum:
            - archiving_research_statistical # Archiving, research, or statistical purposes (with safeguards)
            - consent # Explicit consent
            - law # Employment / social security law
            - vital_interests # Vital interests
            - made_public # Data made public by the individual
            - legal # Legal claims
            - public_interest # Substantial public interest
            - health # Health or social care purposes
            - public_health # Public health
          description: Additional Condition for Special Category Data
        format:
          type: string
          enum:
            - electronic
            - paper
            - other
          description: Format of the asset
        expires_at:
          type: string
          nullable: true
          description: Retention expiry date of the asset
        requires_contract:
          type: boolean
          description: Whether a contract is required for the asset
        has_dspt:
          type: boolean
          description: Whether there is an up to date Data Security & Protection Toolkit in place
        stored_outside_uk_eea:
          type: boolean
          description: Whether the asset is stored or processed outside UK and EEA
        status:
          type: string
          enum:
            - active
            - destroyed
          description: Status of the asset
        is_leak_major_disruption:
          type: boolean
          description: Whether disclosure of this asset result in major disruption to UCL
        is_leak_major_financial_loss:
          type: boolean
          description: Whether disclosure of this asset would result in major financial loss
        is_leak_major_reputational_damage:
          type: boolean
          description: Whether disclosure of this asset would result in major reputational damage
        requires_tre:
          type: boolean
          description: Whether this asset is required to be held in a ISO27001 certified TRE
        has_targeted_threat_actors:
          type: boolean
          description: The data are likely to be targeted by sophisticated, well-resourced, and determined actors, such as serious organised crime groups and state actors.
    Asset:
      allOf:
        - $ref: "#/components/schemas/AssetBase"
        - type: object
          required:
            - id
            - creator_user_id
            - study_id
            - created_at
            - updated_at
            - contract_ids
          properties:
            id:
              type: string
              description: Unique identifier for the asset
            creator_user_id:
              type: string
              description: Unique identifier of the user who created the asset
            study_id:
              type: string
              description: Unique identifier of the study to which the asset belongs
            created_at:
              type: string
              description: Time in RFC3339 format when the asset was created
            updated_at:
              type: string
              description: Time in RFC3339 format when the asset was last updated
            contract_ids:
              type: array
              description: List of contract IDs associated with the asset (empty array if none)
              items:
                type: string
      description: A research study asset

    StudyBase:
      type: object
      description: Base study properties
      required:
        - title
        - data_controller_organisation
        - additional_study_admin_usernames
      properties:
        title:
          type: string
          description: Title of the study
        description:
          type: string
          nullable: true
          description: Description of the study
        additional_study_admin_usernames:
          type: array
          items:
            type: string
          description: List of additional study administrator usernames (empty array if none)
        data_controller_organisation:
          type: string
          description: The organisation acting as data controller for the study (e.g., "UCL" or custom organization name)
        involves_ucl_sponsorship:
          type: boolean
          nullable: true
          description: Whether UCL sponsorship is involved (seeking/have sought)
        involves_cag:
          type: boolean
          nullable: true
          description: Whether Confidentiality Advisory Group approval is involved (seeking/have sought)
        cag_reference:
          type: string
          nullable: true
          description: CAG reference number
        involves_ethics_approval:
          type: boolean
          nullable: true
          description: Whether local or other external body Research Ethics Committee approval is involved (seeking/have sought)
        involves_hra_approval:
          type: boolean
          nullable: true
          description: Whether Health Research Authority Research Ethics Committee approval is involved (seeking/have sought)
        iras_id:
          type: string
          nullable: true
          description: IRAS ID if applicable
        is_nhs_associated:
          type: boolean
          nullable: true
          description: Whether the research is associated with NHS
        involves_nhs_england:
          type: boolean
          nullable: true
          description: Whether NHS England is involved in the research
        nhs_england_reference:
          type: string
          nullable: true
          description: NHS England DARS NIC number
        involves_mnca:
          type: boolean
          nullable: true
          description: Whether the HRA Model Non-Commercial Agreement is involved
        requires_dspt:
          type: boolean
          nullable: true
          description: Whether NHS Data Security & Protection Toolkit is required
        requires_dbs:
          type: boolean
          nullable: true
          description: Whether a DBS check is required for staff
        is_data_protection_office_registered:
          type: boolean
          nullable: true
          description: Whether the study is registered with the UCL Data Protection Office
        data_protection_number:
          type: string
          nullable: true
          description: Full data protection registration number
        involves_third_party:
          type: boolean
          nullable: true
          description: Whether third party organizations are involved
        involves_external_users:
          type: boolean
          nullable: true
          description: Whether external users will have access to the study
        involves_participant_consent:
          type: boolean
          nullable: true
          description: Whether participant consent is involved (seeking/have sought)
        involves_indirect_data_collection:
          type: boolean
          nullable: true
          description: Whether data is collected indirectly for the study (e.g. via a third party)
        involves_data_processing_outside_eea:
          type: boolean
          nullable: true
          description: Whether data is processed outside UK/EEA
        owner_user_id:
          type: string
          description: ID of the user who owns the study
        owner_username:
          type: string
          description: Username of the user who owns the study

    StudyRequest:
      allOf:
        - $ref: "#/components/schemas/StudyBase"
      description: Request payload for creating a new study or updating an existing one

    Study:
      allOf:
        - $ref: "#/components/schemas/StudyBase"
        - type: object
          required:
            - id
            - created_at
            - updated_at
            - approval_status
            - caseref
          properties:
            id:
              type: string
              description: Unique identifier for the study
            created_at:
              type: string
              description: Time in RFC3339 format when the study was created
            updated_at:
              type: string
              description: Time in RFC3339 format when the study was last updated
            approval_status:
              $ref: "#/components/schemas/StudyApprovalStatus"
            feedback:
              type: string
            last_signoff:
              type: string
              nullable: true
              description: Time in RFC3339 format representing when the IAO last confirmed Study details and project access up to date
            caseref:
              type: integer
              description: Unique 5-digit reference number for the study, assigned on creation
            pending_new_owner_username:
              type: string
              description: Username of the owner who has been requested to be assigned for this study, which is pending approval
      description: A research study

    StudyOwnerUpdate:
      type: object
      required:
        - username
      properties:
        username:
          type: string
          description: Username to change the owner of the study to. Must exist

    StudyImport:
      type: object
      required:
        - caseref
        - title
        - created_at
        - updated_at
        - owner_username
        - data_controller_organisation
        - approval_status
      properties:
        title:
          type: string
        description:
          type: string
        additional_study_admin_username:
          type: string
        data_controller_organisation:
          type: string
        involves_ucl_sponsorship:
          type: boolean
        involves_cag:
          type: boolean
        cag_reference:
          type: string
        involves_ethics_approval:
          type: boolean
        involves_hra_approval:
          type: boolean
        iras_id:
          type: string
        is_nhs_associated:
          type: boolean
        involves_nhs_england:
          type: boolean
        nhs_england_reference:
          type: string
        involves_mnca:
          type: boolean
        requires_dspt:
          type: boolean
        requires_dbs:
          type: boolean
        is_data_protection_office_registered:
          type: boolean
        data_protection_number:
          type: string
        involves_third_party:
          type: boolean
        involves_external_users:
          type: boolean
        involves_participant_consent:
          type: boolean
        involves_indirect_data_collection:
          type: boolean
        involves_data_processing_outside_eea:
          type: boolean
        owner_username:
          type: string
        created_at:
          type: string
          description: Time in RFC3339 format when the study was created
        updated_at:
          type: string
          description: Time in RFC3339 format when the study was last updated
        approval_status:
          type: string
        feedback:
          type: string
        last_signoff:
          type: string
        caseref:
          type: integer
        owner_agreed_at:
          type: string
          description: Time in RFC3339 format when the owner agreed to the IAO agreement
        admin_agreed_at:
          type: string
          description: Time in RFC3339 format when the owner agreed to the IAA agreement

    AssetImport:
      type: object
      required:
        - title
        - description
        - classification_impact
        - tier
        - locations
        - format
        - requires_contract
        - expires_at
        - has_dspt
        - stored_outside_uk_eea
        - accessed_by_third_parties
        - status
        - created_at
      properties:
        title:
          type: string
        description:
          type: string
        tier:
          type: integer
        locations:
          type: array
          items:
            type: string
        protection:
          type: string
        legal_basis:
          type: string
        format:
          type: string
        expires_at:
          type: string
        requires_contract:
          type: boolean
        has_dspt:
          type: boolean
        stored_outside_uk_eea:
          type: boolean
        status:
          type: string
        created_at:
          type: string

    ContractImport:
      type: object
      required:
        - title
        - created_at
        - status
      properties:
        title:
          type: string
        created_at:
          type: string
        organisation_signatory:
          type: string
        third_party_name:
          type: string
        status:
          type: string
        start_at:
          type: string
        expiry_at:
          type: string

    StudyApprovalStatus:
      type: string
      enum:
        - Incomplete
        - Pending
        - Approved
        - Rejected
      description: Current approval status

    ProjectTREStatus:
      type: string
      enum:
        - incomplete
        - pending-approval
        - pending-creation
        - deployed
        - pending-update
        - pending-deletion
        - deleted

    StudyReview:
      type: object
      required:
        - status
      properties:
        status:
          $ref: "#/components/schemas/StudyApprovalStatus"
        feedback:
          type: string
          description: Feedback for the study

    ValidationError:
      type: object
      required:
        - error_message
      properties:
        error_message:
          type: string
          description: Validation error message explaining why the request failed

    ProjectTRERequest:
      type: object
      description: Request payload for creating a new TRE project
      allOf:
        - $ref: "#/components/schemas/ProjectTREBase"
        - required:
            - name
            - study_id
          properties:
            name:
              type: string
              description: Name of the project
            study_id:
              type: string
              description: Unique identifier of the study to which the project belongs

    ProjectTREUpdate:
      type: object
      description: Request payload for updating an existing TRE project (members and assets only)
      allOf:
        - $ref: "#/components/schemas/ProjectTREBase"

    ProjectTREMember:
      type: object
      description: A project member with their assigned roles
      required:
        - username
        - roles
      properties:
        username:
          type: string
        desktop_config:
          $ref: "#/components/schemas/ProjectTREUserDesktopConfig"
        uid:
          type: integer
        roles:
          type: array
          description: List of roles to assign to this user (e.g., ["desktop_user", "ingresser"])
          items:
            $ref: "#/components/schemas/ProjectTRERoleName"

    ProjectTREUserDesktopConfig:
      type: object
      properties:
        hpc_instance_type:
          type: string
        root_volume_gb:
          type: integer

    ProjectTRERoleName:
      type: string
      description: Available TRE project roles
      enum:
        - desktop_user
        - ingresser
        - egresser
        - egress_requester
        - egress_checker
        - trusted_egresser
        - API_user

    ProjectTREImport:
      type: object
      required:
        - name
        - status
        - caseref
        - members
        - airlock_ssh_enabled
        - num_required_egress_approvals
        - external_encryption_enabled
        - airlock_whitelist
        - monthly_budget
        - platform
      properties:
        name:
          type: string
        status:
          type: string
        caseref:
          type: integer
        members:
          type: array
          items:
            $ref: "#/components/schemas/ProjectTREMember"
        num_required_egress_approvals:
          type: integer
        external_encryption_enabled:
          type: boolean
        airlock_ssh_enabled:
          type: boolean
        airlock_whitelist:
          type: array
          items:
            type: string
        monthly_budget:
          type: integer
        platform:
          type: string

    Environment:
      type: object
      description: An environment with its tier mapping
      required:
        - id
        - name
        - tier
      properties:
        id:
          type: string
          description: Unique identifier for the environment
        name:
          type: string
          description: Name of the environment (e.g., "ARC Trusted Research Environment")
        tier:
          type: integer
          description: Maximum data tier this environment can handle (assets with tier <= this value can be used)

    EnvironmentName:
      type: string
      enum:
        - "ARC Trusted Research Environment"
        - "Data Safe Haven"

    Project:
      type: object
      description: A project with base details (environment-agnostic)
      required:
        - id
        - name
        - study_id
        - creator_username
        - status
        - created_at
        - updated_at
        - environment_name
      properties:
        id:
          type: string
          description: Unique identifier for the project
        name:
          type: string
          description: Name of the project
        study_id:
          type: string
          description: Unique identifier of the study to which the project belongs
        creator_username:
          type: string
          description: Username of the user who created the project
        status:
          type: string
        created_at:
          type: string
          description: Time in RFC3339 format when the project was created
        updated_at:
          type: string
          description: Time in RFC3339 format when the project was last updated
        environment_name:
          $ref: "#/components/schemas/EnvironmentName"

    ProjectTRE:
      type: object
      description: A TRE project with base project details and environment-specific data
      allOf:
        - $ref: "#/components/schemas/ProjectTREBase"
        - required:
            - id
            - name
            - study_id
            - study_title
            - creator_username
            - status
            - created_at
            - updated_at
            - environment_name
            - assets
            - is_pending_deployment_update
          properties:
            id:
              type: string
              description: Unique identifier for the base project
            name:
              type: string
              description: Name of the project
            study_id:
              type: string
              description: Unique identifier of the study to which the project belongs
            study_title:
              type: string
              description: Title of the study to which the project belongs
            creator_username:
              type: string
              description: Username of the user who created the project
            status:
              $ref: "#/components/schemas/ProjectTREStatus"
            created_at:
              type: string
              description: Time in RFC3339 format when the project was created
            updated_at:
              type: string
              description: Time in RFC3339 format when the project was last updated
            environment_name:
              $ref: "#/components/schemas/EnvironmentName"
            is_pending_deployment_update:
              type: boolean
              description: Is this project waiting on a deployment update (i.e. the requested state is newer than the current state)?
            assets:
              type: array
              description: List of assets associated with this project
              items:
                $ref: "#/components/schemas/Asset"

    ProjectTREBase:
      required:
        - asset_ids
        - members
        - num_required_egress_approvals
        - external_encryption_enabled
        - airlock_whitelist
      properties:
        asset_ids:
          type: array
          description: List of asset identifiers to link to this project (can be empty)
          items:
            type: string
        members:
          type: array
          description: List of project members with their roles (can be empty)
          items:
            $ref: "#/components/schemas/ProjectTREMember"
        num_required_egress_approvals:
          type: integer
          description: Number of approvals required to egress data from the TRE
        external_encryption_enabled:
          type: boolean
          description: Is external encryption enabled for this project?
        airlock_whitelist:
          type: array
          description: List of IPs or FQDNs to whitelist for this project (can be empty)
          items:
            type: string

    ContractBase:
      type: object
      required:
        - title
        - organisation_signatory
        - status
        - asset_ids
      properties:
        title:
          type: string
          description: Name of the contract
        organisation_signatory:
          type: string
          description: Email of the organisation signatory
        other_signatories:
          type: string
          description: Other signatories to the contract. Could be name(s) or email(s)
        third_party_name:
          type: string
          description: Name of the third party organization
        status:
          type: string
          enum: [active, closed]
          description: Current status of the contract
        start_date:
          type: string
          description: Contract start date in YYYY-MM-DD format
          example: "2024-01-01"
        expiry_date:
          type: string
          description: Contract expiry date in YYYY-MM-DD format
          example: "2025-12-31"
        retention_end_date:
          type: string
          description: Contract retention end date in YYYY-MM-DD format
          example: "2035-12-31"
        asset_ids:
          type: array
          description: List of assets associated with this contract
          items:
            type: string

    Contract:
      description: A contract associated with a study
      allOf:
        - $ref: "#/components/schemas/ContractBase"
        - type: object
          required:
            - id
            - created_at
            - updated_at
            - study_id
            - objects_metadata
          properties:
            id:
              type: string
              description: Unique identifier for the contract
            created_at:
              type: string
              description: Time in RFC3339 format when the contract was created
            updated_at:
              type: string
              description: Time in RFC3339 format when the contract was last updated
            study_id:
              type: string
              description: Unique identifier of the study to which the contract belongs
            objects_metadata:
              type: array
              items:
                $ref: "#/components/schemas/ContractObjectMetadata"

    ContractObject:
      type: object
      required:
        - file
      properties:
        file:
          type: string
          format: binary
          description: The contract file to upload (e.g., PDF)

    ContractObjectMetadata:
      type: object
      required:
        - id
        - filename
        - created_at
      properties:
        id:
          type: string
          description: Unique identifier for the contract metadata object
        filename:
          type: string
        created_at:
          type: string
          description: Time in RFC3339 format when the contract was created

    TokenRequest:
      type: object
      required:
        - name
        - valid_for_days
      properties:
        name:
          type: string
        valid_for_days:
          type: integer
          minimum: 1
    Token:
      type: object
      required:
        - id
        - name
        - expires_at
      properties:
        id:
          type: string
        name:
          type: string
        expires_at:
          type: string
          description: Time in RFC3339 at which the token expires
    TokenWithValue:
      allOf:
        - $ref: "#/components/schemas/Token"
        - type: object
          required:
            - value
          properties:
            value:
              type: string

    Feedback:
      type: object
      required:
        - message
      properties:
        message:
          type: string
