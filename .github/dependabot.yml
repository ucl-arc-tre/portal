version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: ".github/workflows"
    schedule:
      interval: "monthly"
    cooldown:
      default-days: 7
    groups:
      dependencies:
        patterns:
          - "*"

  - package-ecosystem: gomod
    directory: /
    cooldown:
      default-days: 7
    schedule:
      interval: "monthly"
    groups:
      dependencies:
        patterns:
          - "*"

  - package-ecosystem: "docker"
    directory: /
    cooldown:
      default-days: 7
    schedule:
      interval: "monthly"

  - package-ecosystem: "npm"
    directory: /web
    schedule:
      interval: "monthly"
    cooldown:
      default-days: 7
    groups:
      dependencies:
        patterns:
          - "*"
